<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightHouse - Enterprise Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Collapsed Button (Hidden by default) -->
  <div class="collapsed-button" id="collapsedButton" title="Click to expand LightHouse">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="#1e8fff" style="filter: drop-shadow(0 0 8px rgba(30, 143, 255, 0.4));">
      <circle cx="12" cy="12" r="11" fill="#1e8fff"/>
      <rect x="10" y="6" width="4" height="10" fill="#ffffff" opacity="0.95"/>
      <rect x="10" y="8" width="4" height="1" fill="#1e8fff" opacity="0.8"/>
      <circle cx="12" cy="4" r="1.5" fill="#ffd700" opacity="0.95"/>
    </svg>
  </div>

  <div class="popup-container" id="popupContainer">
    <!-- Header with Project Selector -->
    <div class="popup-header">
      <div class="header-branding">
        <svg class="header-icon" viewBox="0 0 24 24" width="24" height="24" fill="#1e8fff">
          <circle cx="12" cy="12" r="11" fill="#1e8fff"/>
          <rect x="10" y="6" width="4" height="10" fill="#ffffff" opacity="0.95"/>
          <rect x="10" y="8" width="4" height="1" fill="#1e8fff" opacity="0.8"/>
          <circle cx="12" cy="4" r="1.5" fill="#ffd700" opacity="0.95"/>
        </svg>
        <div class="header-text">
          <h1>LightHouse</h1>
          <p>Enterprise Hub</p>
        </div>
      </div>
      <div class="header-controls">
        <button class="collapse-btn" id="collapseBtn" title="Collapse LightHouse">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1e8fff" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button class="profile-btn" id="profileBtn" title="Profile">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1e8fff" stroke-width="2">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M 4 20 Q 4 15 12 15 Q 20 15 20 20"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Quick Navigation Bar -->
    <div class="quick-nav">
      <select id="projectSelector" class="project-select">
        <option value="">Select Project</option>
        <option value="employee">Employee Onboarding Portal</option>
        <option value="payment">Payment Processing System</option>
      </select>
      <button class="nav-link-btn" id="appLinkBtn" title="Go to Main App">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="13" x2="3" y2="13"></line>
          <polyline points="8 18 3 13 8 8"></polyline>
          <polyline points="15.5 4 20 4 20 8.5"></polyline>
        </svg>
        Main App
      </button>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-navigation">
      <button class="tab-btn active" data-tab="overview" title="Overview">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"></path>
        </svg>
        <span>Overview</span>
      </button>
      <button class="tab-btn" data-tab="jira" title="Jira">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="8" height="8" rx="1"></rect>
          <rect x="13" y="3" width="8" height="8" rx="1"></rect>
          <rect x="3" y="13" width="8" height="8" rx="1"></rect>
          <rect x="13" y="13" width="8" height="8" rx="1"></rect>
        </svg>
        <span>Tickets</span>
      </button>
      <button class="tab-btn" data-tab="meetings" title="Meetings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="17" rx="2"></rect>
          <line x1="3" y1="8" x2="21" y2="8"></line>
        </svg>
        <span>Calendar</span>
      </button>
      <button class="tab-btn" data-tab="teams" title="Teams">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="7" r="4"></circle>
          <path d="M4 21v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"></path>
        </svg>
        <span>Teams</span>
      </button>
    </div>

    <!-- Main Content Area -->
    <div class="content-area">
      
      <!-- Overview Section -->
      <div class="content-section active" id="overview-section">
        <div class="overview-grid">
          <div class="overview-box">
            <h3>Recent Activity</h3>
            <div id="recentActivity" class="activity-list">
              <div class="loading-spinner"></div>
            </div>
          </div>
          <div class="overview-box">
            <h3>Project Resources</h3>
            <div id="projectResources" class="resources-list">
              <a href="#" class="resource-link">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 21H3V3h9V1H3a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2v-9h-2v9z"></path>
                  <polyline points="15 1 20 1 20 6"></polyline>
                  <line x1="20" y1="1" x2="9" y2="12"></line>
                </svg>
                Confluence Pages
              </a>
              <a href="#" class="resource-link">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="1"></circle>
                  <path d="M12 1v6m0 6v6"></path>
                  <path d="M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24"></path>
                  <path d="M1 12h6m6 0h6"></path>
                  <path d="M4.22 19.78l4.24-4.24m-2.12-2.12l4.24-4.24"></path>
                  <path d="M19.78 19.78l-4.24-4.24m-2.12-2.12l-4.24-4.24"></path>
                  <path d="M19.78 4.22l-4.24 4.24m-2.12 2.12l-4.24 4.24"></path>
                </svg>
                Git Commits
              </a>
              <a href="#" class="resource-link">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
                </svg>
                Sprint Info
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Jira Section with Checklist -->
      <div class="content-section" id="jira-section">
        <div class="section-toolbar">
          <h3>Jira Tickets</h3>
          <div class="toolbar-controls">
            <button class="btn-add" id="addTaskBtn" title="Add new task">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add Task
            </button>
            <select id="statusFilter" class="status-filter">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="not-started">Not Started</option>
            <option value="completed">Completed</option>
          </select>
          </div>
        </div>
        <div id="ticketsContainer" class="tickets-container">
          <div class="loading-spinner"></div>
        </div>
        
        <!-- Ticket Detail Modal -->
        <div id="ticketModal" class="modal" style="display:none">
          <div class="modal-content">
            <div class="modal-header">
              <h2 id="ticketTitle"></h2>
              <button class="close-btn" onclick="closeTicketModal()">&times;</button>
            </div>
            <div class="modal-body">
              <div id="ticketDetail" class="ticket-detail"></div>
              <div id="ticketComments" class="ticket-comments"></div>
            </div>
            <div class="modal-footer">
              <button class="btn-secondary" onclick="closeTicketModal()">Cancel</button>
              <button class="btn-primary" onclick="saveTicketChanges()">Save</button>
            </div>
          </div>
        </div>

        <!-- Create New Task Modal -->
        <div id="createTaskModal" class="modal" style="display:none">
          <div class="modal-content modal-form">
            <div class="modal-header">
              <h2>Create New Task</h2>
              <button class="close-btn" onclick="closeCreateTaskModal()">&times;</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label>Task Summary *</label>
                <input type="text" id="newTaskSummary" class="input-text" placeholder="What needs to be done?">
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea id="newTaskDescription" class="input-text" placeholder="Add more details..."></textarea>
              </div>
              <div class="form-group">
                <label>Assign To</label>
                <select id="newTaskAssignee" class="input-select">
                  <option value="">Select team member...</option>
                </select>
              </div>
              <div class="form-group">
                <label>Priority</label>
                <select id="newTaskPriority" class="input-select">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
              <div class="form-group">
                <label>Type</label>
                <select id="newTaskType" class="input-select">
                  <option value="Task" selected>Task</option>
                  <option value="Bug">Bug</option>
                  <option value="Story">Story</option>
                  <option value="Feature">Feature</option>
                </select>
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="newTaskStatus" class="input-select">
                  <option value="active" selected>Active</option>
                  <option value="inactive">Inactive</option>
                  <option value="not-started">Not Started</option>
                  <option value="in-progress">In Progress</option>
                  <option value="done">Done</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-secondary" onclick="closeCreateTaskModal()">Cancel</button>
              <button class="btn-primary" onclick="saveNewTask()">Create Task</button>
            </div>
          </div>
        </div>

        <!-- Change Status Modal -->
        <div id="changeStatusModal" class="modal" style="display:none">
          <div class="modal-content modal-form">
            <div class="modal-header">
              <h2 id="changeStatusTitle">Change Status</h2>
              <button class="close-btn" onclick="closeChangeStatusModal()">&times;</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label>Status</label>
                <select id="changeStatusValue" class="input-select">
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                  <option value="to-do">To Do</option>
                  <option value="in-progress">In Progress</option>
                  <option value="in-review">In Review</option>
                  <option value="done">Done</option>
                </select>
              </div>
              <div class="form-group">
                <label>Assign To</label>
                <select id="changeStatusAssignee" class="input-select">
                  <option value="">No change</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-secondary" onclick="closeChangeStatusModal()">Cancel</button>
              <button class="btn-primary" onclick="saveChangeStatus()">Update</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Meetings Section with Calendar View -->
      <div class="content-section" id="meetings-section">
        <div class="section-toolbar">
          <h3>Upcoming Meetings</h3>
          <button class="btn-small" id="refreshMeetings">Refresh</button>
        </div>
        <div id="meetingsContainer" class="meetings-container">
          <div class="loading-spinner"></div>
        </div>
      </div>

      <!-- Teams Chat Section -->
      <div class="content-section" id="teams-section">
        <div class="section-toolbar">
          <h3>Teams Chat</h3>
          <input type="text" id="teamsChanelFilter" class="channel-filter" placeholder="Filter channels...">
        </div>
        <div id="teamsContainer" class="teams-container">
          <div class="loading-spinner"></div>
        </div>
      </div>

    </div>

    <!-- Chat Section at Bottom -->
    <div class="chat-section">
      <div class="chat-header">
        <span>Ask LightHouse</span>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="input-area">
        <div class="query-input-wrapper">
          <textarea id="queryInput" class="query-input" placeholder="Ask me anything..." rows="2"></textarea>
          <button id="sendBtn" class="btn-send" title="Send">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Profile Panel -->
    <div class="profile-panel" id="profilePanel">
      <div class="panel-header">
        <h2>Settings</h2>
        <button class="close-btn" id="profileClose">&times;</button>
      </div>
      <div class="panel-body">
        <div class="setting-group">
          <label>Backend URL</label>
          <input type="text" id="settingsBackendUrl" class="input-text">
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="settingsVoice">
            Enable Voice Search
          </label>
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="settingsContextMenu">
            Enable Context Menu
          </label>
        </div>
        <div class="user-info">
          <p id="profileName">Loading...</p>
          <p id="profileEmail" style="font-size: 12px; color: var(--muted);">Loading...</p>
        </div>
      </div>
      <div class="panel-footer">
        <button class="btn-secondary" id="profileLogout">Logout</button>
        <button class="btn-primary" id="profileSave">Save Settings</button>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
