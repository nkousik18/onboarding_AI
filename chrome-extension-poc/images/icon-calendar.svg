<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar grid -->
  <rect x="3" y="4" width="18" height="17" rx="2" fill="none" stroke="#1e8fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Header line -->
  <line x1="3" y1="8" x2="21" y2="8" stroke="#1e8fff" stroke-width="1.5"/>
  
  <!-- Grid lines -->
  <line x1="9" y1="4" x2="9" y2="21" stroke="#1e8fff" stroke-width="1" opacity="0.4"/>
  <line x1="15" y1="4" x2="15" y2="21" stroke="#1e8fff" stroke-width="1" opacity="0.4"/>
  <line x1="3" y1="12" x2="21" y2="12" stroke="#1e8fff" stroke-width="1" opacity="0.4"/>
  <line x1="3" y1="16.5" x2="21" y2="16.5" stroke="#1e8fff" stroke-width="1" opacity="0.4"/>
  
  <!-- Date circle -->
  <circle cx="6" cy="6" r="1.2" fill="#00d48a" opacity="0.8"/>
</svg>