<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#1e8fff"/>
  
  <!-- Lighthouse tower - main body -->
  <rect x="52" y="50" width="24" height="45" fill="#ffffff" opacity="0.95"/>
  
  <!-- Tower stripes for depth -->
  <rect x="52" y="55" width="24" height="3" fill="#1e8fff" opacity="0.8"/>
  <rect x="52" y="65" width="24" height="3" fill="#1e8fff" opacity="0.8"/>
  <rect x="52" y="75" width="24" height="3" fill="#1e8fff" opacity="0.8"/>
  
  <!-- Lighthouse light room (top) -->
  <circle cx="64" cy="45" r="10" fill="#ffd700" opacity="0.95"/>
  
  <!-- Light rays -->
  <g opacity="0.8" fill="#ffd700" stroke="none">
    <polygon points="64,28 62,38 66,38"/>
    <polygon points="64,28 55,32 60,39"/>
    <polygon points="64,28 73,32 68,39"/>
    <polygon points="75,45 65,43 65,48"/>
    <polygon points="53,45 63,43 63,48"/>
  </g>
  
  <!-- Lighthouse base -->
  <polygon points="48,95 80,95 75,105 53,105" fill="#ffffff" opacity="0.9"/>
  
  <!-- Accent glow -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="#00d48a" stroke-width="1" opacity="0.3"/>
</svg>